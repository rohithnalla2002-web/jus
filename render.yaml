# Render Blueprint - API only (rootDir: server).
# After push: Dashboard → New → Blueprint → connect repo, or link this file to an existing service.
# Set secrets in the dashboard: DATABASE_URL, JWT_SECRET, ADMIN_USERNAME, ADMIN_PASSWORD.

services:
 - type: web
    name: goldmind-erp-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    # Shell script - dashboard "Start Command" often gets corrupted ('npm start`').
    # Manual override: type exactly →  sh start.sh
    startCommand: sh start.sh
    envVars:
     - key: NODE_VERSION
        value: "20"
