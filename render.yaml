# Render Blueprint — API only (rootDir: server).
# After push: Dashboard → New → Blueprint → connect repo, or link this file to an existing service.
# Set secrets in the dashboard: DATABASE_URL, JWT_SECRET, ADMIN_USERNAME, ADMIN_PASSWORD.

services:
  - type: web
    name: jewelcraft-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    # Use node directly — avoids shell/quote issues if dashboard had typos like `npm start`
    startCommand: node src/index.js
    envVars:
      - key: NODE_VERSION
        value: "20"
